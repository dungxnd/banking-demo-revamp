_format_version: "3.0"
_transform: true

# Kong config for Python (origin/final) perf stack.
# Routes all /api/* to api-producer-py:8080 — identical topology to the Go stack.
# The producer dispatches to RabbitMQ queues based on path prefix.

services:
  - name: api-producer-py
    url: http://api-producer-py:8080
    routes:
      - name: api-route
        paths:
          - /api
        strip_path: false
    plugins:
      - name: cors
        config:
          origins: ["*"]
          credentials: false
          methods: [GET, POST, PUT, DELETE, OPTIONS]
          headers: [Accept, Content-Type, Date, X-Session]
