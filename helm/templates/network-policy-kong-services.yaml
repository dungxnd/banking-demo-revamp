{{- if .Values.networkPolicies.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kong-to-services
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "banking-demo.labels" . | nindent 4 }}
spec:
  # Target: all app microservices — matched by app.kubernetes.io/name
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values:
          - {{ include "banking-demo.auth-service.fullname" . }}
          - {{ include "banking-demo.account-service.fullname" . }}
          - {{ include "banking-demo.transfer-service.fullname" . }}
          - {{ include "banking-demo.notification-service.fullname" . }}
          - {{ include "banking-demo.frontend.fullname" . }}
          - {{ include "banking-demo.api-producer.fullname" . }}
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "banking-demo.kong.selectorLabels" . | nindent 14 }}
      ports:
        - { port: 8001, protocol: TCP }
        - { port: 8002, protocol: TCP }
        - { port: 8003, protocol: TCP }
        - { port: 8004, protocol: TCP }
        - { port: 8080, protocol: TCP }
        - { port: 80,   protocol: TCP }
{{- end }}
