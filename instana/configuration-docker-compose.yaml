# Instana Agent configuration for banking-demo — Docker Compose on EC2
# Mount at: /opt/instana/agent/etc/instana/configuration.yaml
#
# Hot-reloaded: most settings take effect without agent restart.
# Merge order: configuration-*.yaml files merged alphabetically.

# ---------------------------------------------------------------------------
# Zone — groups this host in the Application Perspective filter drop-downs.
# Without this the host appears in Infrastructure but NOT in the AP builder.
# ---------------------------------------------------------------------------
com.instana.zone:
  name: banking-ec2-prod

# ---------------------------------------------------------------------------
# Host tags — additional filter dimensions in the AP builder
# ---------------------------------------------------------------------------
com.instana.tags:
  - environment: production
  - team: banking
  - project: banking-demo

# ---------------------------------------------------------------------------
# OpenTelemetry — accept OTLP from Go services (gRPC :4317, HTTP :4318)
# listenAddress must be 0.0.0.0 so Docker containers reaching the host via
# host.docker.internal (which resolves to the docker0 bridge IP, not 127.0.0.1)
# can deliver spans. Without this the agent only listens on localhost.
# ---------------------------------------------------------------------------
com.instana.plugin.opentelemetry:
  enabled: true
  grpc:
    enabled: true
    listenAddress: "0.0.0.0:4317"
  http:
    enabled: true
    listenAddress: "0.0.0.0:4318"

# ---------------------------------------------------------------------------
# Go — Go services are auto-detected by the agent via process discovery.
# No explicit plugin block is required for Go process detection.
# banking-demo golang branch: api-producer, auth, account, transfer, notification.
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# PostgreSQL monitoring
# Requires track_counts, track_activities, track_io_timing ON in postgresql.conf
# postgres is exposed on host port 5432 (see docker-compose.yml ports mapping).
# ---------------------------------------------------------------------------
com.instana.plugin.postgresql:
  user: banking
  password: bankingpass
  database: banking
  host: localhost
  port: 5432

# ---------------------------------------------------------------------------
# Redis monitoring
# redis is exposed on host port 6379 (see docker-compose.yml ports mapping).
# No password — banking-demo Redis runs without auth.
# CONFIG command must not be disabled or renamed on the Redis side.
# ---------------------------------------------------------------------------
com.instana.plugin.redis:
  username: ''
  password: ''
  poll_rate: 10
  hosts:
    - host: '127.0.0.1'
      port: 6379

# ---------------------------------------------------------------------------
# Kong API Gateway monitoring
# Kong admin API is exposed on host port 8001 (see docker-compose.yml).
# Prometheus plugin must be enabled in kong/kong.yml (add if not present).
# ---------------------------------------------------------------------------
com.instana.plugin.kong:
  enabled: true
  dataset_size: 10
  status_code_group: '2xx,3xx,4xx,5xx'
  remote:
    - host: '127.0.0.1'
      port: '8001'
      availabilityZone: 'banking-ec2-prod'
      poll_rate: 30
      protocol: 'http'

# ---------------------------------------------------------------------------
# Tracing — forward OTel traceparent/tracestate headers across services
# ---------------------------------------------------------------------------
com.instana.tracing:
  extra-http-headers:
    - traceparent
    - tracestate
    - x-instana-t
    - x-instana-s
    - x-instana-l

# ---------------------------------------------------------------------------
# Secrets — redact sensitive keys from collected config/env data
# ---------------------------------------------------------------------------
com.instana.secrets:
  matcher: contains-ignore-case
  list:
    - password
    - secret
    - key
    - token
    - DATABASE_URL
    - REDIS_URL
