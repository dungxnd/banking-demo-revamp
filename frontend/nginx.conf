# Load the official NGINX OpenTelemetry dynamic module.
# Installed via: apk add nginx-module-otel (see Dockerfile).
# Ships to /usr/lib/nginx/modules/ngx_otel_module.so on Alpine.
load_module modules/ngx_otel_module.so;

worker_processes  auto;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout  65;

    # ── OpenTelemetry ─────────────────────────────────────────────────────────
    # Export spans via OTLP/gRPC to the Instana agent cluster Service.
    # The Helm chart creates instana-agent.instana-agent.svc.cluster.local
    # automatically (service.create=true in the agent Helm values).
    # Using the cluster-DNS FQDN avoids NODE_IP env expansion in nginx.conf
    # (nginx cannot interpolate env vars in directives without lua/perl modules).
    otel_exporter {
        endpoint instana-agent.instana-agent.svc.cluster.local:4317;
    }

    # Service name used for infrastructure correlation in Instana:
    # links this NGINX process to the frontend pod in the AP dependency map.
    otel_service_name frontend;

    # Trace all requests. otel_trace_context propagate = extract incoming
    # W3C traceparent (from Kong) and inject into upstream proxy requests.
    otel_trace on;

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # SPA — static file serving, no upstream proxy, no context propagation needed.
        location / {
            otel_trace_context extract;
            try_files $uri $uri/ /index.html;
        }

        # REST API -> Kong Gateway
        # proxy_set_header voids otel_trace_context at the http{} level, so
        # otel_trace_context must be repeated here (NGINX module API limitation).
        location /api/ {
            otel_trace_context propagate;
            proxy_pass http://kong:8000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket -> Kong Gateway
        # Same proxy_set_header rule applies — propagate context explicitly.
        location /ws {
            otel_trace_context propagate;
            proxy_pass http://kong:8000/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Instana Nginx sensor — ngx_http_stub_status_module
        # Agent scans /etc/nginx/nginx.conf for a stub_status location.
        # Must be in this file (not in conf.d/) for the sensor to detect it.
        #
        # The Instana host agent reaches the pod via its k3s CNI IP (10.42.x.x),
        # not 127.0.0.1, so the pod CIDR must be allowed in addition to loopback.
        # 10.42.0.0/16 is the default k3s flannel CIDR — internal only, not
        # reachable from the internet.
        location /nginx_status {
            stub_status;
            otel_trace off;           # do not trace health-check scrapes
            allow 127.0.0.1;
            allow 10.42.0.0/16;   # k3s flannel (Kubernetes)
            allow 172.30.0.0/24;  # Docker Compose bridge (EC2)
            deny all;
        }
    }
}
