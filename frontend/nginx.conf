worker_processes  auto;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout  65;

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # SPA
        location / {
            try_files $uri $uri/ /index.html;
        }

        # REST API -> Kong Gateway
        location /api/ {
            proxy_pass http://kong:8000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket -> Kong Gateway
        location /ws {
            proxy_pass http://kong:8000/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Instana Nginx sensor — ngx_http_stub_status_module
        # Agent scans /etc/nginx/nginx.conf for a stub_status location.
        # Must be in this file (not in conf.d/) for the sensor to detect it.
        #
        # The Instana host agent reaches the pod via its k3s CNI IP (10.42.x.x),
        # not 127.0.0.1, so the pod CIDR must be allowed in addition to loopback.
        # 10.42.0.0/16 is the default k3s flannel CIDR — internal only, not
        # reachable from the internet.
        location /nginx_status {
            stub_status;
            allow 127.0.0.1;
            allow 10.42.0.0/16;   # k3s flannel (Kubernetes)
            allow 172.30.0.0/24;  # Docker Compose bridge (EC2)
            deny all;
        }
    }
}
