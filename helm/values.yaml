# ============================================================
# values.yaml — version manifest and shared config.
#
# Edit THIS file to:
#   - bump an image tag for any service or infra component
#   - change credentials / connection strings
#   - toggle features (secret.enabled, dbMigration.enabled, etc.)
#   - tune resources or CORS
#
# For real secrets (production): create helm/values.local.yaml
# (gitignored) and override the secrets.* values there.
# See helm/values.local.example.yaml for a template.
#
# Deploy with:
#   helm upgrade --install banking ./helm -n banking --create-namespace \
#     -f helm/values.yaml -f helm/values.local.yaml --wait
# ============================================================

# ── Global ───────────────────────────────────────────────────
global:
  namespace: banking
  secretName: banking-db-secret
  corsOrigins: "*"

# ── Secrets ──────────────────────────────────────────────────
secret:
  enabled: true
  postgresUser: banking
  postgresPassword: bankingpass
  postgresDb: banking
  databaseUrl: "postgres://banking:bankingpass@postgres:5432/banking?sslmode=disable"
  redisUrl: "redis://redis:6379"
  natsUrl: "nats://nats:4222"

# ── Caddy — Edge proxy (hostNetwork, ghim control-plane node) ─
caddy:
  enabled: true
  image:
    repository: caddy
    tag: "2-alpine"
    pullPolicy: IfNotPresent
  replicas: 1
  hostNetwork: true
  nodeSelector:
    node-role.kubernetes.io/control-plane: ""
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"
    - key: "node-role.kubernetes.io/master"
      operator: "Exists"
      effect: "NoSchedule"
  tls:
    enabled: false                 # true = HTTPS via Let's Encrypt (HTTP-01 challenge, no API key needed)
    domain: ""                     # e.g. "bank.duckdns.org" (any domain with A record → node IP)
  resources:
    requests: { cpu: 50m,  memory: 64Mi }
    limits:   { cpu: 200m, memory: 128Mi }
  securityContext:
    pod:
      runAsNonRoot: true
      runAsUser: 10001
      runAsGroup: 10001
      fsGroup: 10001
      seccompProfile:
        type: RuntimeDefault
    container:
      allowPrivilegeEscalation: true
      capabilities:
        drop: ["ALL"]
        add: ["NET_BIND_SERVICE"]

# ── Shared Env — ConfigMap applied to all backend services ────
sharedEnv:
  LOG_LEVEL: "info"
  TZ: "Asia/Ho_Chi_Minh"
  NATS_URL: "nats://nats:4222"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "banking"

# ── Network Policies ─────────────────────────────────────────
networkPolicies:
  enabled: true                    # false on clusters without CNI policy support

# ── DB Migration Job ─────────────────────────────────────────
dbMigration:
  enabled: false
  image: postgres:18
  hookWeight: "-5"
  backoffLimit: 3
  activeDeadlineSeconds: 120
  resources:
    requests:
      memory: "64Mi"
      cpu: "10m"
    limits:
      memory: "256Mi"
      cpu: "200m"

# ── PostgreSQL ───────────────────────────────────────────────
postgres:
  enabled: true
  replicas: 1
  image:
    repository: postgres
    tag: "18"
    pullPolicy: IfNotPresent
  service:
    port: 5432
    portName: postgres
    clusterIP: ""
  secretRef:
    name: ""   # empty → uses banking-demo.secretName helper
    keys:
      user: POSTGRES_USER
      password: POSTGRES_PASSWORD
      db: POSTGRES_DB
  storage:
    volumeName: postgres-data
    mountPath: /var/lib/postgresql
    storageClassName: local-path
    size: 5Gi
  resources:
    requests:
      memory: "256Mi"
      cpu: "10m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  securityContext:
    pod:
      runAsNonRoot: true
      runAsUser: 999
      runAsGroup: 999
      fsGroup: 999
      seccompProfile:
        type: RuntimeDefault
    container:
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
  readinessProbe:
    enabled: true
    user: banking
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3

# ── Redis ────────────────────────────────────────────────────
redis:
  enabled: true
  replicas: 1
  image:
    repository: redis
    tag: "8-alpine"
    pullPolicy: IfNotPresent
  service:
    port: 6379
    portName: redis
    clusterIP: ""
  storage:
    volumeName: redis-data
    mountPath: /data
    storageClassName: local-path
    size: 1Gi
  resources:
    requests:
      memory: "64Mi"
      cpu: "10m"
    limits:
      memory: "256Mi"
      cpu: "250m"
  securityContext:
    pod:
      runAsNonRoot: true
      runAsUser: 999
      runAsGroup: 999
      fsGroup: 999
      seccompProfile:
        type: RuntimeDefault
    container:
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
  readinessProbe:
    enabled: true
    command: ["redis-cli", "ping"]
    initialDelaySeconds: 3
    periodSeconds: 5
    timeoutSeconds: 2

# ── NATS ─────────────────────────────────────────────────────
nats:
  enabled: true
  image:
    repository: nats
    tag: "2-alpine"
    pullPolicy: IfNotPresent
  jetstream:
    enabled: true
    storageDir: /data
    storage:
      storageClass: local-path
      size: 1Gi
  resources:
    requests:
      memory: "64Mi"
      cpu: "10m"
    limits:
      memory: "256Mi"
      cpu: "250m"
  securityContext:
    pod:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      seccompProfile:
        type: RuntimeDefault
    container:
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
  exporter:
    enabled: true
    image:
      repository: natsio/prometheus-nats-exporter
      tag: "0.20.1"
      pullPolicy: IfNotPresent
    resources:
      requests:
        memory: "8Mi"
        cpu: "5m"
      limits:
        memory: "128Mi"
        cpu: "100m"

# ── Kong ─────────────────────────────────────────────────────
kong:
  enabled: true
  replicas: 1
  image:
    repository: kong
    tag: "3.9"
    pullPolicy: IfNotPresent
  configFileName: kong.yml
  configMountPath: /kong
  proxyPort: 8000
  proxyPortName: proxy
  adminPort: 8001
  adminPortName: admin

  # ClusterIP — Caddy is the sole entry point on :80/:443 via hostNetwork.
  # Caddy proxies → kong-proxy.banking.svc.cluster.local:8000.
  # No NodePort, no external exposure of Kong.
  service:
    type: ClusterIP

  updateStrategy: RollingUpdate

  env:
    KONG_DATABASE: "off"
    KONG_DECLARATIVE_CONFIG: "/kong/kong.yml"
    KONG_PROXY_ACCESS_LOG: "/dev/stdout"
    KONG_ADMIN_ACCESS_LOG: "/dev/stdout"
    KONG_PROXY_ERROR_LOG: "/dev/stderr"
    KONG_ADMIN_ERROR_LOG: "/dev/stderr"
    # Bind admin API on all interfaces so the Instana agent pod (running in
    # instana-agent namespace) can reach it via cluster DNS / ClusterIP Service.
    # The admin port (8001) is NOT exposed externally — only reachable
    # from within the cluster.
    KONG_ADMIN_LISTEN: "0.0.0.0:8001"
    KONG_PROXY_LISTEN: "0.0.0.0:8000"
    KONG_NGINX_WORKER_PROCESSES: "1"
    KONG_TRACING_INSTRUMENTATIONS: all
    KONG_TRACING_SAMPLING_RATE: "1.0"
    KONG_OPENTELEMETRY_TRACING: "on"
    # Trust X-Forwarded-* from Caddy (upstream edge proxy).
    KONG_TRUSTED_IPS: "0.0.0.0/0,::/0"
    KONG_REAL_IP_HEADER: "X-Forwarded-For"

  # ── Backend routing table ──────────────────────────────────
  # Route priority = longest prefix wins.
  # /api and /ws must appear before / (catch-all).
  backends:
    - name: api-producer
      url: "http://api-producer-upstream:8080"
      upstream:
        name: api-producer-upstream
        algorithm: round-robin
        healthchecks:
          active:
            type: http
            http_path: /health
            timeout: 1
            concurrency: 10
            healthy:
              interval: 30
              successes: 2
            unhealthy:
              interval: 10
              http_failures: 3
        targets:
          - target: api-producer:8080
            weight: 100
      routes:
        - name: api-route
          paths: ["/api"]
          strip_path: false

    - name: notification-service
      url: "http://notification-upstream:8004"
      upstream:
        name: notification-upstream
        algorithm: least-connections
        healthchecks:
          active:
            type: http
            http_path: /health
            timeout: 1
            concurrency: 10
            healthy:
              interval: 30
              successes: 2
            unhealthy:
              interval: 10
              http_failures: 3
        targets:
          - target: notification-service:8004
            weight: 100
      routes:
        - name: notification-ws-route
          paths: ["/ws"]
          strip_path: false
          protocols: ["http", "https"]

    # Frontend last — broadest match, lowest specificity.
    - name: frontend
      url: "http://frontend-upstream:80"
      upstream:
        name: frontend-upstream
        algorithm: round-robin
        healthchecks:
          active:
            type: http
            http_path: /
            timeout: 1
            concurrency: 10
            healthy:
              interval: 30
              successes: 2
            unhealthy:
              interval: 10
              http_failures: 3
        targets:
          - target: frontend:80
            weight: 100
      routes:
        - name: frontend-route
          paths: ["/"]
          strip_path: false

  # ── CORS ──────────────────────────────────────────────────
  # corsCredentials must be false when origins is "*".
  corsOrigins: "*"
  corsCredentials: false
  corsMethods: ["GET", "POST", "PUT", "DELETE", "OPTIONS", "PATCH"]
  corsHeaders:
    - Accept
    - Accept-Version
    - Authorization
    - Content-Length
    - Content-MD5
    - Content-Type
    - Date
    - X-Session
    - X-Admin-Secret

  # ── Global plugins ─────────────────────────────────────────
  globalPlugins:
    - name: prometheus
    # opentelemetry plugin — propagates W3C traceparent into upstream HTTP
    # requests so api-producer receives the Kong span as its parent, linking
    # the full trace waterfall: Caddy → Kong → api-producer → NATS services.
    #
    # traces_endpoint: Kong POSTs to this URL verbatim (no path appended).
    # Instana agent OTLP/HTTP: POST /v1/traces → 200 OK (confirmed).
    # IBM docs otlphttp exporter uses :4318 base; the SDK appends /v1/traces.
    # Kong is not the OTel SDK — it must include the full path explicitly.
    #   traces_endpoint: "...4318/v1/traces"   ✓ confirmed working
    #   traces_endpoint: "...4318"             ✗ returns 404
    - name: opentelemetry
      config:
        traces_endpoint: "http://instana-agent.instana-agent.svc.cluster.local:4318/v1/traces"
        resource_attributes:
          service.name: kong
          service.namespace: banking-demo
        propagation:
          default_format: w3c
          extract:
            - w3c
          inject:
            - w3c

  # ── Per-service extra plugins ──────────────────────────────
  extraPlugins:
    - name: rate-limiting
      config:
        minute: 120
        policy: local
        error_code: 429
        error_message: "Rate limit exceeded"
    - name: request-size-limiting
      config:
        allowed_payload_size: 4
        size_unit: megabytes

  readinessProbe:
    enabled: true
    command: ["kong", "health"]
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 10

  livenessProbe:
    enabled: true
    command: ["kong", "health"]
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3

  resources:
    requests:
      memory: "128Mi"
      cpu: "10m"
    limits:
      memory: "512Mi"
      cpu: "1000m"

  securityContext:
    pod:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      seccompProfile:
        type: RuntimeDefault
    container:
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]

# ── Ingress ───────────────────────────────────────────────────
ingress:
  enabled: false
  className: ""
  host: ""
  paths: []

# ── Frontend ─────────────────────────────────────────────────
frontend:
  enabled: true
  replicas: 1
  image:
    repository: ghcr.io/dungxnd/banking-demo-revamp/frontend
    tag: latest
    pullPolicy: Always
  service:
    port: 80
    portName: http
  resources:
    requests:
      memory: "32Mi"
      cpu: "10m"
    limits:
      memory: "256Mi"
      cpu: "250m"
  securityContext:
    pod:
      runAsNonRoot: true
      runAsUser: 10001
      runAsGroup: 10001
      fsGroup: 10001
      seccompProfile:
        type: RuntimeDefault
    container:
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
  readinessProbe:
    enabled: true
    path: /
    port: 80
    initialDelaySeconds: 5
    periodSeconds: 10

