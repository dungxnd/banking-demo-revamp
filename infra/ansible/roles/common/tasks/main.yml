---
- name: Update apt cache and upgrade packages
  ansible.builtin.apt:
    update_cache: true
    upgrade: safe
    cache_valid_time: 3600
  tags: common

- name: Install base packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - git
      - make
      - unzip
      - htop
      - vim
      - lsb-release
      - python3-pip
    state: present
  tags: common

- name: Set timezone to UTC
  community.general.timezone:
    name: UTC
  tags: common

- name: Create swap file
  ansible.builtin.command:
    cmd: fallocate -l {{ swap_size_mb }}M /swapfile
    creates: /swapfile
  tags: common

- name: Set swap file permissions
  ansible.builtin.file:
    path: /swapfile
    owner: root
    group: root
    mode: "0600"
  tags: common

- name: Format swap file
  ansible.builtin.command:
    cmd: mkswap -f /swapfile
  register: mkswap_result
  changed_when: mkswap_result.rc == 0
  # Only run if swap is not yet active; -f forces reformat of an unformatted/corrupt file
  when: ansible_facts['swaptotal_mb'] == 0
  tags: common

- name: Enable swap
  ansible.builtin.command:
    cmd: swapon /swapfile
  register: swapon_result
  changed_when: swapon_result.rc == 0
  failed_when: swapon_result.rc != 0 and 'already' not in swapon_result.stderr
  when: ansible_facts['swaptotal_mb'] == 0
  tags: common

- name: Persist swap in /etc/fstab
  ansible.builtin.lineinfile:
    path: /etc/fstab
    line: "/swapfile none swap sw 0 0"
    state: present
  tags: common

- name: Apply sysctl settings
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    sysctl_set: true
    state: present
    reload: true
  loop: "{{ sysctl_settings | dict2items }}"
  tags: common
