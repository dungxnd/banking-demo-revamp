# instana/instana-agent-remote.cr.yaml
#
# InstanaAgentRemote CR template — banking-demo (golang branch, k3s on EC2).
#
# This is the REMOTE AGENT deployment mode — a separate mode from the DaemonSet.
# Use this when you need to monitor a system that has NO Kubernetes presence and
# cannot host a standard Instana agent. Examples: DB2, IBM Concert (CVE),
# IBM Turbonomic, any external system reachable only via network API.
#
# NOT for banking-demo's PostgreSQL/Redis — those are pods inside k3s and are
# best monitored directly by the DaemonSet agent co-located on the same node.
# This file is a template: replace the configuration_yaml section with sensors
# for your actual remote target.
#
# PREREQUISITES:
#   - Operator v2.1.30+ running in instana-agent namespace
#   - On OpenShift only: oc adm policy add-scc-to-user anyuid -z instana-agent-remote -n instana-agent
#
# APPLY (secrets passed via --set-string to avoid shell quoting issues):
#   kubectl -n instana-agent create secret generic instana-remote-key \
#     --from-literal=key="${INSTANA_AGENT_KEY}" \
#     --dry-run=client -o yaml | kubectl apply -f -
#
#   kubectl apply -f instana/instana-agent-remote.cr.yaml
#
# UPDATE (after any edit):
#   kubectl apply -f instana/instana-agent-remote.cr.yaml
#
# UNINSTALL (must remove CR before operator, and delete cluster-level objects):
#   kubectl delete -f instana/instana-agent-remote.cr.yaml
#   kubectl delete clusterrole instana-agent-remote
#   kubectl delete clusterrolebinding instana-agent-remote

apiVersion: instana.io/v1
kind: InstanaAgentRemote
metadata:
  name: remote-agent
  namespace: instana-agent
spec:
  # zone.name is REQUIRED for InstanaAgentRemote (unlike InstanaAgent where
  # cluster.name is an alternative).
  zone:
    name: banking-dung-ec2-remote   # use a name that identifies the remote target

  agent:
    # Bring your own keys secret — avoids embedding the key in this file.
    # Create it before applying: see APPLY section above.
    keysSecret: instana-remote-key

    # agent.key can alternatively be set inline, but it would then be
    # committed to git. Use keysSecret instead.
    # key: <INSTANA_AGENT_KEY>

    endpointHost: ingress-red-saas.instana.io  # EU: ingress-blue-saas.instana.io
    endpointPort: "443"

    env: {}

    configuration_yaml: |
      # ── TEMPLATE — replace with your actual remote target sensors ───────────
      #
      # Example: IBM Concert (CVE)
      # com.instana.plugin.cve:
      #   enabled: true
      #   concert:
      #     base_url: 'https://concert.example.com'
      #     instance_id: '<INSTANCE_ID>'
      #     api_key: '<API_KEY>'
      #     poll_rate: 10
      #
      # Example: IBM Turbonomic
      # com.instana.plugin.turbonomic:
      #   enabled: true
      #   host: '<TURBONOMIC_HOST>'
      #   target: '<TARGET_NAME>'
      #   auth:
      #     username: <USERNAME>
      #     password: <PASSWORD>
      #   tags:
      #     - 'turbonomic'
      #
      # Example: DB2 (remote)
      # com.instana.plugin.db2:
      #   host: db2.example.com
      #   port: 50000
      #   username: db2inst1
      #   password: <PASSWORD>
      #   databases:
      #     - name: SAMPLE

      # ── Secrets redaction ────────────────────────────────────────────────────
      com.instana.secrets:
        matcher: contains-ignore-case
        list:
          - secret
          - token
          - password
          - api_key
