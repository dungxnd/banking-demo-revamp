{{- if .Values.dbMigration.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-db-migration
  namespace: {{ include "banking-demo.namespace" . }}
  annotations:
    helm.sh/hook: pre-upgrade
    helm.sh/hook-weight: {{ .Values.dbMigration.hookWeight | quote }}
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
  labels:
    {{- include "banking-demo.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration
spec:
  backoffLimit: {{ .Values.dbMigration.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.dbMigration.activeDeadlineSeconds }}
  template:
    metadata:
      labels:
        {{- include "banking-demo.labels" . | nindent 8 }}
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          image: {{ .Values.dbMigration.image | quote }}
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "=== DB migration: add phone + account_number ==="
              export PGHOST="${POSTGRES_HOST}"
              export PGPORT="${POSTGRES_PORT}"
              export PGDATABASE="${POSTGRES_DB}"
              export PGUSER="${POSTGRES_USER}"
              export PGPASSWORD="${POSTGRES_PASSWORD}"

              psql -c "select 1" >/dev/null

              psql <<'SQL'
              ALTER TABLE users ADD COLUMN IF NOT EXISTS phone VARCHAR(20);
              ALTER TABLE users ADD COLUMN IF NOT EXISTS account_number VARCHAR(20);
              ALTER TABLE users ADD COLUMN IF NOT EXISTS is_admin BOOLEAN NOT NULL DEFAULT FALSE;

              DO $$
              DECLARE
                r RECORD;
                candidate TEXT;
                attempts INT;
              BEGIN
                FOR r IN SELECT id FROM users WHERE account_number IS NULL LOOP
                  attempts := 0;
                  LOOP
                    candidate := lpad((floor(random()*1e12))::bigint::text, 12, '0');
                    EXIT WHEN NOT EXISTS (SELECT 1 FROM users WHERE account_number = candidate);
                    attempts := attempts + 1;
                    IF attempts >= 200 THEN
                      RAISE EXCEPTION 'Cannot generate unique account_number';
                    END IF;
                  END LOOP;
                  UPDATE users SET account_number = candidate WHERE id = r.id;
                END LOOP;
              END $$;

              CREATE UNIQUE INDEX IF NOT EXISTS users_account_number_uq
                ON users(account_number) WHERE account_number IS NOT NULL;
              CREATE UNIQUE INDEX IF NOT EXISTS users_phone_uq
                ON users(phone) WHERE phone IS NOT NULL;

              SELECT 'migration ok' AS status;
              SQL
              echo "Migration done."
          env:
            - name: POSTGRES_HOST
              value: {{ include "banking-demo.postgres.fullname" . | quote }}
            - name: POSTGRES_PORT
              value: {{ .Values.postgres.service.port | default 5432 | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.secret.postgresDb | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.secret.postgresUser | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "banking-demo.secretName" . }}
                  key: POSTGRES_PASSWORD
          resources:
            {{- toYaml .Values.dbMigration.resources | nindent 12 }}
{{- end }}
