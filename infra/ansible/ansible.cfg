[defaults]
# Inventory is generated by Terraform â€” do not edit inventories/vps/*.ini by hand.
inventory          = inventories/vps/hosts.ini
roles_path         = roles
remote_user        = ubuntu
private_key_file   = ~/.ssh/id_ed25519

# Speed: pipeline SSH connections, gather only what we need.
pipelining         = True
forks              = 5
gathering          = smart
fact_caching            = jsonfile
fact_caching_connection = /tmp/ansible_facts_cache
fact_caching_timeout    = 86400

# Output â€” use builtin yaml formatter (community.general.yaml was removed in v12)
stdout_callback       = ansible.builtin.default
result_format         = yaml
display_skipped_hosts = False
deprecation_warnings  = False

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no
pipelining = True
