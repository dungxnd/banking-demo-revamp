{{- if .Values.networkPolicies.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-caddy-to-kong
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "banking-demo.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "banking-demo.kong.selectorLabels" . | nindent 6 }}
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "banking-demo.caddy.selectorLabels" . | nindent 14 }}
      ports:
        - { port: {{ .Values.kong.proxyPort }}, protocol: TCP }
{{- end }}
