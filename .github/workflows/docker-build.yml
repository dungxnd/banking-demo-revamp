name: Docker Build & Push

on:
  push:
    branches: [main, instana, final, golang]
    paths:
      - 'go.work'
      - 'go.work.sum'
      - 'internal/**'
      - 'services/**'
      - 'producer/**'
      - 'frontend/**'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (e.g. v1.2, sha-abc1234). Leave blank to use short SHA.'
        required: false
        default: ''
        type: string
      services:
        description: 'Services to build (comma-separated or "all")'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - api-producer
          - auth-service
          - account-service
          - transfer-service
          - notification-service
          - frontend

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/dungxnd/banking-demo-revamp

jobs:
  # ── 1. Resolve tag + which services changed ─────────────────────────────────
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      services: ${{ steps.resolve.outputs.services }}
    steps:
      - uses: actions/checkout@v7

      - name: Detect changed services
        uses: dorny/paths-filter@v4
        id: filter
        if: github.event_name == 'push'
        with:
          filters: |
            api-producer:
              - 'producer/**'
              - 'internal/**'
              - 'go.work'
            auth-service:
              - 'services/auth-service/**'
              - 'internal/**'
              - 'go.work'
            account-service:
              - 'services/account-service/**'
              - 'internal/**'
              - 'go.work'
            transfer-service:
              - 'services/transfer-service/**'
              - 'internal/**'
              - 'go.work'
            notification-service:
              - 'services/notification-service/**'
              - 'internal/**'
              - 'go.work'
            frontend:
              - 'frontend/**'

      - name: Resolve tag and services list
        id: resolve
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            # Use provided tag or fall back to short SHA
            TAG="${{ github.event.inputs.tag }}"
            [ -z "$TAG" ] && TAG="$(git rev-parse --short=7 HEAD)"
            SVCS="${{ github.event.inputs.services }}"
            [ "$SVCS" == "all" ] && SVCS="api-producer,auth-service,account-service,transfer-service,notification-service,frontend"
          else
            TAG="$(git rev-parse --short=7 HEAD)"
            SVCS=""
            [ "${{ steps.filter.outputs.api-producer }}"         == "true" ] && SVCS="$SVCS,api-producer"
            [ "${{ steps.filter.outputs.auth-service }}"         == "true" ] && SVCS="$SVCS,auth-service"
            [ "${{ steps.filter.outputs.account-service }}"      == "true" ] && SVCS="$SVCS,account-service"
            [ "${{ steps.filter.outputs.transfer-service }}"     == "true" ] && SVCS="$SVCS,transfer-service"
            [ "${{ steps.filter.outputs.notification-service }}" == "true" ] && SVCS="$SVCS,notification-service"
            [ "${{ steps.filter.outputs.frontend }}"             == "true" ] && SVCS="$SVCS,frontend"
            SVCS="${SVCS#,}"
            [ -z "$SVCS" ] && SVCS="none"
          fi
          echo "tag=$TAG"       >> "$GITHUB_OUTPUT"
          echo "services=$SVCS" >> "$GITHUB_OUTPUT"
          echo "Resolved: tag=$TAG  services=$SVCS"

  # ── 2. Build + push each service in parallel ────────────────────────────────
  build:
    name: build / ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.services != 'none'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api-producer
            dockerfile: producer/Dockerfile
            context: .
          - service: auth-service
            dockerfile: services/auth-service/Dockerfile
            context: .
          - service: account-service
            dockerfile: services/account-service/Dockerfile
            context: .
          - service: transfer-service
            dockerfile: services/transfer-service/Dockerfile
            context: .
          - service: notification-service
            dockerfile: services/notification-service/Dockerfile
            context: .
          - service: frontend
            dockerfile: frontend/Dockerfile
            context: frontend
    steps:
      - name: Check if this service should build
        id: gate
        run: |
          SVCS="${{ needs.prepare.outputs.services }}"
          SVC="${{ matrix.service }}"
          if echo ",$SVCS," | grep -q ",$SVC,"; then
            echo "build=true" >> "$GITHUB_OUTPUT"
          else
            echo "build=false" >> "$GITHUB_OUTPUT"
            echo "Skipping $SVC (not in [$SVCS])"
          fi

      - uses: actions/checkout@v7
        if: steps.gate.outputs.build == 'true'

      - name: Set up Docker Buildx
        if: steps.gate.outputs.build == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io
        if: steps.gate.outputs.build == 'true'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        if: steps.gate.outputs.build == 'true'
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ needs.prepare.outputs.tag }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

  # ── 3. Job summary ──────────────────────────────────────────────────────────
  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [prepare, build]
    if: always()
    steps:
      - name: Write summary
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          SVCS="${{ needs.prepare.outputs.services }}"
          RESULT="${{ needs.build.result }}"
          {
            echo "## Docker Build & Push"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Branch** | \`${{ github.ref_name }}\` |"
            echo "| **Commit** | \`${{ github.sha }}\` |"
            echo "| **Tag** | \`$TAG\` |"
            echo "| **Services** | \`$SVCS\` |"
            echo "| **Result** | $RESULT |"
            echo ""
            if [ "$SVCS" != "none" ] && [ "$RESULT" == "success" ]; then
              echo "### Images pushed"
              for svc in $(echo "$SVCS" | tr ',' ' '); do
                echo "- \`${{ env.IMAGE_PREFIX }}/$svc:$TAG\`"
              done
            fi
          } >> "$GITHUB_STEP_SUMMARY"
